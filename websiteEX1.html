<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MusicX</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    color:white;
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* Sidebar */

.sidebar{
    width:240px;
    background:#000;
    padding:20px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    margin-bottom:30px;
    color:#1DB954;
}

.menu{
    list-style:none;
}

.menu li{
    padding:14px;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:10px;
    transition:0.3s;
}

.menu li:hover{
    background:#1f1f1f;
}

/* Main */

.main{
    flex:1;
    padding:25px;
    overflow-y:auto;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.search{
    width:300px;
    padding:12px;
    border:none;
    border-radius:30px;
    outline:none;
    background:#2a2a2a;
    color:white;
}

.profile{
    background:#1DB954;
    padding:10px 18px;
    border-radius:30px;
    color:black;
    font-weight:bold;
}

/* Songs */

.section-title{
    margin-bottom:20px;
    font-size:28px;
}

.song-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:#181818;
    padding:15px;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    background:#282828;
    transform:scale(1.03);
}

.cover{
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:12px;
}

.song-name{
    font-size:18px;
    margin-bottom:5px;
}

.artist{
    color:#b3b3b3;
    font-size:14px;
}

.play-btn{
    margin-top:12px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#1DB954;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

/* Player */

.player{
    position:fixed;
    bottom:0;
    left:240px;
    right:0;
    height:90px;
    background:#181818;
    border-top:1px solid #333;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
}

.now-playing{
    display:flex;
    align-items:center;
    gap:15px;
}

.now-playing img{
    width:60px;
    height:60px;
    border-radius:10px;
}

.controls button{
    background:none;
    border:none;
    color:white;
    font-size:26px;
    cursor:pointer;
    margin:0 10px;
}

audio{
    width:300px;
}

@media(max-width:768px){

.sidebar{
    display:none;
}

.player{
    left:0;
    flex-direction:column;
    height:auto;
    padding:10px;
    gap:10px;
}

audio{
    width:100%;
}

}
</style>
</head>
<body>

<div class="sidebar">
    <div class="logo">MusicX</div>

    <ul class="menu">
        <li>🏠 Home</li>
        <li>🔥 Trending</li>
        <li>❤️ Favorites</li>
        <li>🎵 Playlists</li>
        <li>⚙ Settings</li>
    </ul>
</div>

<div class="main">

    <div class="topbar">
        <input type="text" class="search" placeholder="Search songs...">
        <div class="profile">Pasan</div>
    </div>

    <h1 class="section-title">Trending Songs</h1>

    <div class="song-grid">

        <div class="card">
            <img src="https://picsum.photos/300?1" class="cover">
            <div class="song-name">Night Drive</div>
            <div class="artist">Floffy Disc</div>
            <button class="play-btn"
            onclick="playSong(
            'Night Drive',
            'Floffy Disc',
            'https://picsum.photos/300?1',
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'
            )">Play</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300?2" class="cover">
            <div class="song-name">Sky Beats</div>
            <div class="artist">Nova</div>
            <button class="play-btn"
            onclick="playSong(
            'Sky Beats',
            'Nova',
            'https://picsum.photos/300?2',
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'
            )">Play</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300?3" class="cover">
            <div class="song-name">Dream Wave</div>
            <div class="artist">DJ Vision</div>
            <button class="play-btn"
            onclick="playSong(
            'Dream Wave',
            'DJ Vision',
            'https://picsum.photos/300?3',
            'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'
            )">Play</button>
        </div>

    </div>

</div>

<div class="player">

    <div class="now-playing">
        <img id="player-cover" src="https://picsum.photos/100">
        <div>
            <div id="player-song">No song selected</div>
            <div id="player-artist" style="color:gray;font-size:14px;">
                MusicX Player
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="audioPlayer.play()">▶</button>
        <button onclick="audioPlayer.pause()">⏸</button>
    </div>

    <audio id="audio" controls></audio>

</div>

<script>

const audioPlayer = document.getElementById("audio");

function playSong(title, artist, cover, src){

    document.getElementById("player-song").innerText = title;
    document.getElementById("player-artist").innerText = artist;
    document.getElementById("player-cover").src = cover;

    audioPlayer.src = src;
    audioPlayer.play();
}

/* Search */

const searchInput = document.querySelector(".search");

searchInput.addEventListener("keyup", function(){

    let value = this.value.toLowerCase();

    let cards = document.querySelectorAll(".card");

    cards.forEach(card=>{

        let song = card.querySelector(".song-name")
        .innerText.toLowerCase();

        if(song.includes(value)){
            card.style.display="block";
        }else{
            card.style.display="none";
        }

    });

});

</script>

</body>
</html>
